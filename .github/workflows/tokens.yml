name: Validate Design Tokens

on:
  push:
    paths:
      - 'tokens.json'
  pull_request:
    paths:
      - 'tokens.json'

jobs:
  validate-tokens:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Build tokens
        run: npm run build:tokens

      - name: Show generated tokens
        run: cat src/styles/tokens.css
