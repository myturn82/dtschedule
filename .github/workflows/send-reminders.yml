name: Send D-1 Reminders

on:
  # schedule 트리거 비활성화 (2026-07-14) — GitHub Actions cron이 5시간 넘게 자동 실행되지 않는 등
  # best-effort 스케줄러의 신뢰성 문제로 자동발송을 중단. 당분간 관리자콘솔의 수동 발송으로 대체.
  # 자동발송을 다시 켤 때는 아래 schedule 블록의 주석을 해제한다.
  # schedule:
  #   - cron: '*/30 * * * *'
  workflow_dispatch:       # 수동 실행 허용

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - name: Call Edge Function (cron mode)
        run: |
          curl -s -X POST \
            "${{ secrets.SUPABASE_URL }}/functions/v1/send-reminders" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            -d '{}'
        timeout-minutes: 2
